description: >-
  FinOps view of Fundraise Up spend. Fundraise Up charges no software license or
  API fee; cost is a transaction-based platform fee taken as a percentage of each
  processed donation - 4% standard and 5% for cryptocurrency - with no setup fees,
  monthly fees, or contracts. Payment processor fees (Stripe, PayPal, Gemini) are
  billed separately and stack on top of the platform fee. Because donors can elect
  to cover fees at checkout, and most do, the organization's effective net cost is
  frequently far below the headline percentage. Spend therefore scales directly
  with fundraising volume rather than with API call counts.
notes: >-
  Exact percentages and nonprofit-discounted processor rates should be verified on
  the pricing page during reconciliation. Fee coverage by donors materially lowers
  effective cost and should be tracked as an offset.
