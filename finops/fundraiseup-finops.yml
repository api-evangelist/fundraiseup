meters:
- name: platform_fee
  description: Percentage platform fee on each processed money donation (standard 4%).
  unit: donation_amount
  aggregation: sum
  dimensions:
  - account
  - campaign
- name: crypto_platform_fee
  description: Percentage platform fee on each cryptocurrency donation (standard 5%).
  unit: donation_amount
  aggregation: sum
  dimensions:
  - account
- name: processor_fee
  description: Payment processor fees (Stripe, PayPal, Gemini) charged separately per transaction.
  unit: donation_amount
  aggregation: sum
  dimensions:
  - account
  - processor
- name: donor_covered_fees
  description: Fees voluntarily covered by donors at checkout, offsetting the organization's net cost.
  unit: donation_amount
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track platform fee, processor fees, and donor-covered fees per campaign to see true net cost per dollar raised.
- name: Allocation
  description: Tag donations by campaign or program so fees map to internal cost centers and appeals.
- name: Optimization
  description: Encourage donor fee coverage and recurring giving to lower effective cost; reconcile processor rates against nonprofit discounts.
- name: Accountability
  description: Review monthly fees against funds raised; assign campaign owners responsible for cost-per-dollar-raised.
